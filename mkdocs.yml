site_name: IMP Sigil
site_description: Book of IMP
site_url: https://impsigil.github.io/

theme:
  name: material
  language: pl
  custom_dir: overrides
  palette:
    - scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/weather-night
        name: Przełącz na tryb ciemny
    - scheme: slate
      primary: black
      accent: black
      toggle:
        icon: material/weather-sunny
        name: Przełącz na tryb jasny
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md

plugins:
  - search

extra:
  generator: false
  social:
    - icon: fontawesome/brands/gitlab
      link: https://fetlife.com/I-M-P
    - icon: fontawesome/brands/discord
      link: https://discord.com/users/694867336179613756

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/age-gate.css

extra_javascript:
  - assets/age-gate.js
